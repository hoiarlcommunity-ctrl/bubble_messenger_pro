services:
  app:
    build: .
    container_name: bubble_messenger_app
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/dev-mails:/app/data/dev-mails
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: bubble_messenger_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bubble_messenger
      POSTGRES_USER: bubble
      POSTGRES_PASSWORD: bubble_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bubble -d bubble_messenger"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bubble_messenger_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    container_name: bubble_messenger_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-bubble}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-bubble_minio_password_change_me}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2024-10-29T15-34-59Z
    container_name: bubble_messenger_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY:-bubble} $${S3_SECRET_KEY:-bubble_minio_password_change_me};
      mc mb -p local/$${S3_BUCKET:-bubble-media};
      mc anonymous set none local/$${S3_BUCKET:-bubble-media};
      exit 0;
      "

  coturn:
    image: coturn/coturn:4.6-alpine
    container_name: bubble_messenger_coturn
    restart: unless-stopped
    env_file: .env
    command:
      - -n
      - --log-file=stdout
      - --listening-port=3478
      - --min-port=49160
      - --max-port=49200
      - --fingerprint
      - --lt-cred-mech
      - --realm=${TURN_REALM:-localhost}
      - --user=${TURN_USERNAME:-bubbleturn}:${TURN_PASSWORD:-bubble_turn_password_change_me}
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

  nginx:
    image: nginx:1.27-alpine
    container_name: bubble_messenger_nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
